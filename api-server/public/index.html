<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>進捗レコード メモ更新</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    max-width: 900px;
    margin: 2rem auto;
    padding: 0 1rem;
    line-height: 1.5;
  }
  h1 { font-size: 1.3rem; }
  h2 { font-size: 1.05rem; margin-top: 2rem; }
  fieldset {
    border: 1px solid #8884;
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 1rem;
  }
  label { display: block; font-size: 0.85rem; margin-bottom: 0.25rem; opacity: 0.8; }
  input[type=text], input[type=password], select, textarea {
    width: 100%;
    box-sizing: border-box;
    padding: 0.5rem;
    font-size: 1rem;
    border-radius: 6px;
    border: 1px solid #8888;
    margin-bottom: 0.75rem;
  }
  textarea { min-height: 5rem; resize: vertical; }
  button {
    padding: 0.5rem 1.2rem;
    font-size: 0.95rem;
    border-radius: 6px;
    border: 1px solid #8888;
    cursor: pointer;
    background: #2563eb;
    color: white;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; font-size: 0.9rem; }
  th, td { border: 1px solid #8884; padding: 0.4rem 0.5rem; text-align: left; vertical-align: top; }
  tr.selected { outline: 2px solid #2563eb; }
  tr:hover { cursor: pointer; background: #8881; }
  .memo-cell { white-space: pre-wrap; max-width: 220px; }
  #message { margin-top: 0.75rem; font-size: 0.9rem; }
  #message.error { color: #dc2626; }
  #message.ok { color: #16a34a; }
  #selectedInfo { font-size: 0.9rem; opacity: 0.85; margin-bottom: 0.75rem; white-space: pre-wrap; }
</style>
</head>
<body>

<h1>進捗レコード メモ更新</h1>

<fieldset>
  <legend>接続設定</legend>
  <label for="apiKey">APIキー(x-api-key)</label>
  <input type="password" id="apiKey" placeholder="api-server/.env の API_KEY">
</fieldset>

<fieldset>
  <legend>整理番号で検索</legend>
  <label for="tableSelect">対象テーブル</label>
  <select id="tableSelect">
    <option value="junin">国内(JuninProcess)</option>
    <option value="foreign">PCT国際段階(ForeignProcess)</option>
    <option value="foreignc">外国(国別)(ForeignCProcess)</option>
  </select>
  <label for="seiriNum">整理番号</label>
  <input type="text" id="seiriNum" placeholder="例: 12345-JP">
  <button id="searchBtn">検索</button>
</fieldset>

<h2>検索結果(クリックで選択)</h2>
<div id="resultArea">まだ検索していません。</div>

<h2>選択中のレコード</h2>
<div id="selectedInfo">レコードを選択してください。</div>
<fieldset id="memoForm" style="display:none;">
  <label for="memoText">追記する内容(既存のmemoがあればその末尾に改行して追加されます)</label>
  <textarea id="memoText" placeholder="追記するメモを入力"></textarea>
  <button id="updateBtn">更新</button>
</fieldset>

<div id="message"></div>

<script>
const state = { records: [], selectedIndex: -1, table: 'junin' };

const apiKeyInput = document.getElementById('apiKey');
apiKeyInput.value = localStorage.getItem('juninApiKey') || '';
apiKeyInput.addEventListener('change', () => {
  localStorage.setItem('juninApiKey', apiKeyInput.value);
});

const tableSelect = document.getElementById('tableSelect');
tableSelect.value = localStorage.getItem('recordsTable') || 'junin';
tableSelect.addEventListener('change', () => {
  localStorage.setItem('recordsTable', tableSelect.value);
});

function showMessage(text, kind) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = kind || '';
}

function formatDateTime(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleString('ja-JP');
}

async function apiFetch(url, options) {
  const headers = Object.assign({}, (options && options.headers) || {}, {
    'x-api-key': apiKeyInput.value,
  });
  const res = await fetch(url, Object.assign({}, options, { headers }));
  const body = await res.json().catch(() => ({}));
  if (!res.ok) {
    throw new Error(body.error || ('HTTP ' + res.status));
  }
  return body;
}

function renderResults() {
  const area = document.getElementById('resultArea');
  if (state.records.length === 0) {
    area.textContent = '該当レコードがありません。';
    return;
  }
  const table = document.createElement('table');
  table.innerHTML = `
    <thead>
      <tr>
        <th>作業日</th><th>時刻</th><th>作業</th><th>担当</th><th>期限</th><th>完了</th><th>memo</th>
      </tr>
    </thead>
  `;
  const tbody = document.createElement('tbody');
  state.records.forEach((rec, idx) => {
    const tr = document.createElement('tr');
    if (idx === state.selectedIndex) tr.classList.add('selected');
    tr.innerHTML = `
      <td>${formatDateTime(rec.sagyoDD).split(' ')[0] || ''}</td>
      <td>${formatDateTime(rec.sagyoTT).split(' ')[1] || ''}</td>
      <td>${rec.sagyo || ''}</td>
      <td>${rec.tanto || ''}</td>
      <td>${formatDateTime(rec.kigen).split(' ')[0] || ''}</td>
      <td>${rec.sagyoKanryo ? '済' : ''}</td>
      <td class="memo-cell">${(rec.memo || '').replace(/</g, '&lt;')}</td>
    `;
    tr.addEventListener('click', () => selectRecord(idx));
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  area.innerHTML = '';
  area.appendChild(table);
}

function selectRecord(idx) {
  state.selectedIndex = idx;
  renderResults();
  const rec = state.records[idx];
  const infoEl = document.getElementById('selectedInfo');
  infoEl.textContent =
    `整理番号: ${rec.SeiriNum}\n作業: ${rec.sagyo || ''}  担当: ${rec.tanto || ''}\n` +
    `現在のmemo:\n${rec.memo || '(なし)'}`;
  document.getElementById('memoForm').style.display = '';
  document.getElementById('memoText').value = '';
}

document.getElementById('searchBtn').addEventListener('click', async () => {
  const seiriNum = document.getElementById('seiriNum').value.trim();
  if (!seiriNum) {
    showMessage('整理番号を入力してください。', 'error');
    return;
  }
  showMessage('検索中...', '');
  state.selectedIndex = -1;
  document.getElementById('memoForm').style.display = 'none';
  document.getElementById('selectedInfo').textContent = 'レコードを選択してください。';
  try {
    const data = await apiFetch(
      '/api/records?table=' + encodeURIComponent(tableSelect.value) +
      '&seiriNum=' + encodeURIComponent(seiriNum)
    );
    state.table = tableSelect.value;
    state.records = data.records || [];
    renderResults();
    showMessage(`${state.records.length} 件見つかりました。`, 'ok');
  } catch (err) {
    state.records = [];
    renderResults();
    showMessage('検索に失敗しました: ' + err.message, 'error');
  }
});

document.getElementById('updateBtn').addEventListener('click', async () => {
  if (state.selectedIndex < 0) {
    showMessage('レコードを選択してください。', 'error');
    return;
  }
  const text = document.getElementById('memoText').value.trim();
  if (!text) {
    showMessage('追記する内容を入力してください。', 'error');
    return;
  }
  const rec = state.records[state.selectedIndex];
  showMessage('更新中...', '');
  try {
    const data = await apiFetch('/api/records/memo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        table: state.table,
        seiriNum: rec.SeiriNum,
        sagyoDD: rec.sagyoDD,
        sagyoTT: rec.sagyoTT,
        text,
      }),
    });
    rec.memo = data.memo;
    renderResults();
    selectRecord(state.selectedIndex);
    showMessage('更新しました。', 'ok');
  } catch (err) {
    showMessage('更新に失敗しました: ' + err.message, 'error');
  }
});
</script>

</body>
</html>
